# ──────────────────────────────────────────────
# PostgreSQL tuning — Analyzer DB (read-heavy)
# Stores aggregated metrics, read by Query Service
# Tuned for 4-8 GB RAM containers
# ──────────────────────────────────────────────

# Memory — larger buffers for read caching
shared_buffers = 384MB
effective_cache_size = 1GB
work_mem = 32MB
maintenance_work_mem = 128MB

# WAL — standard settings, moderate writes
wal_buffers = 16MB
max_wal_size = 1GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# Connections
listen_addresses = '*'
max_connections = 100

# Autovacuum — standard
autovacuum_max_workers = 3
autovacuum_naptime = 60s

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# Parallelism — aggressive for complex aggregation queries
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
