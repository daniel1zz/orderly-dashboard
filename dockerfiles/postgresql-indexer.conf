# ──────────────────────────────────────────────
# PostgreSQL tuning — Indexer DB (write-heavy)
# Stores raw blockchain events, high-frequency inserts
# Tuned for 4-8 GB RAM containers
# ──────────────────────────────────────────────

# Memory
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL — optimized for write throughput
wal_buffers = 32MB
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
wal_compression = on

# Commit — batch writes for throughput (slight durability tradeoff)
synchronous_commit = off
commit_delay = 100

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Connections
max_connections = 100

# Autovacuum — aggressive for write-heavy tables
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# Parallelism — minimal, writes don't benefit much
max_worker_processes = 4
max_parallel_workers_per_gather = 1
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
