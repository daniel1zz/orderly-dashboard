# RPC Load Balancer for Orderly L2 (Chain ID 291)
# Round-robin across 9 Conduit API keys to distribute CU usage

resolver 8.8.8.8 valid=300s ipv6=off;

split_clients "$request_id" $conduit_key {
    11.11%  "66RjpBXSTxMuoz6hz2UDL2mQTmdVN5SHM";
    11.11%  "PbKbdnvddRVVeBrkkXsbj6utYgLbP4SRb";
    11.11%  "88szbhANcyMSRuhJoCjEE7Q1iTBrhMbXt";
    11.11%  "Cr4xHriLXNe6HNgoNaeSZRywgfjmvTTb2";
    11.11%  "5PLR2REhv9vcnTFmvYvUwRwdQjKKbFfzg";
    11.11%  "5GwS5MDnJRaGysN7Mwf6X7cfxDsQ3qgrL";
    11.11%  "7KfeK5wrXcmcAfZhmUuuJFKoURdHovtFf";
    11.11%  "BQf9t1uinvh6o17cNJ8vQcDkx6GVsvUcV";
    *       "7Fb5rw42ymfK4NPdAiKQkjv3E6QhEdxdC";
}

server {
    listen 8545;
    server_name _;

    location / {
        set $backend https://rpc.orderly.network/$conduit_key;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_set_header Host rpc.orderly.network;
        proxy_set_header Content-Type "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
