# RPC Load Balancer for Orderly L2 (Chain ID 291)
# Distributes JSON-RPC requests across multiple upstream endpoints
# Automatically retries on 429 (rate limit) by failing over to next upstream

resolver 8.8.8.8 valid=30s ipv6=off;

upstream orderly_rpc {
    server 127.0.0.1:8546;  # proxy to rpc.orderly.network
    server 127.0.0.1:8547;  # proxy to 291.rpc.thirdweb.com
}

# Internal proxy to rpc.orderly.network
server {
    listen 8546;
    location / {
        proxy_pass https://rpc.orderly.network/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host rpc.orderly.network;
        proxy_set_header Content-Type application/json;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

# Internal proxy to 291.rpc.thirdweb.com
server {
    listen 8547;
    location / {
        proxy_pass https://291.rpc.thirdweb.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 291.rpc.thirdweb.com;
        proxy_set_header Content-Type application/json;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

# Main load balancer entry point
server {
    listen 8545;
    server_name _;

    location / {
        proxy_pass http://orderly_rpc;
        proxy_http_version 1.1;
        proxy_set_header Content-Type application/json;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # On error or rate limit, try next upstream
        proxy_next_upstream error timeout http_502 http_503 http_429;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 15s;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
