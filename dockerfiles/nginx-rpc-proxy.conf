# RPC Load Balancer for Orderly L2 (Chain ID 291)
# Uses split_clients for deterministic round-robin across HTTPS upstreams
# Automatically fails over on errors via proxy_intercept_errors

resolver 8.8.8.8 valid=60s ipv6=off;

split_clients "$request_id" $rpc_backend {
    5%  "https://rpc.orderly.network";
    *   "https://291.rpc.thirdweb.com";
}

map $rpc_backend $rpc_host {
    "https://rpc.orderly.network"      "rpc.orderly.network";
    "https://291.rpc.thirdweb.com"     "291.rpc.thirdweb.com";
}

server {
    listen 8545;
    server_name _;

    location / {
        proxy_pass $rpc_backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $rpc_host;
        proxy_set_header Content-Type "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
