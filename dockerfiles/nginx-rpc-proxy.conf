# RPC Load Balancer for Orderly L2 (Chain ID 291)
# Uses split_clients for deterministic round-robin across HTTPS upstreams
# Automatically fails over on errors via proxy_intercept_errors

resolver 8.8.8.8 valid=60s ipv6=off;

server {
    listen 8545;
    server_name _;

    location / {
        proxy_pass https://291.rpc.thirdweb.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 291.rpc.thirdweb.com;
        proxy_set_header Content-Type "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Fallback to orderly on error
        error_page 429 502 503 = @fallback;
    }

    location @fallback {
        proxy_pass https://rpc.orderly.network;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host rpc.orderly.network;
        proxy_set_header Content-Type "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
