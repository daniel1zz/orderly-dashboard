services:
  # ──────────────────────────────────────────────
  # Databases
  # ──────────────────────────────────────────────
  postgres-indexer:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderly_indexer
      POSTGRES_USER: orderly
      POSTGRES_PASSWORD: ${POSTGRES_INDEXER_PASSWORD:-orderly_secret}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - pgdata-indexer:/var/lib/postgresql/data
      - ./dockerfiles/postgresql-indexer.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderly -d orderly_indexer"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-analyzer:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderly_analyzer
      POSTGRES_USER: orderly
      POSTGRES_PASSWORD: ${POSTGRES_ANALYZER_PASSWORD:-orderly_secret}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - pgdata-analyzer:/var/lib/postgresql/data
      - ./dockerfiles/postgresql-analyzer.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderly -d orderly_analyzer"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────
  # Backend services (unified Rust build)
  # ──────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-rust
      target: indexer
    restart: unless-stopped
    depends_on:
      postgres-indexer:
        condition: service_healthy
      postgres-analyzer:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://orderly:${POSTGRES_INDEXER_PASSWORD:-orderly_secret}@postgres-indexer:5432/orderly_indexer
      ANALYZER_DATABASE_URL: postgres://orderly:${POSTGRES_ANALYZER_PASSWORD:-orderly_secret}@postgres-analyzer:5432/orderly_analyzer
    volumes:
      - ./orderly-dashboard-indexer/config.json:/home/orderly/config.json:ro
    networks:
      - backend

  analyzer:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-rust
      target: analyzer
    restart: unless-stopped
    depends_on:
      postgres-analyzer:
        condition: service_healthy
      indexer:
        condition: service_started
    environment:
      DATABASE_URL: postgres://orderly:${POSTGRES_ANALYZER_PASSWORD:-orderly_secret}@postgres-analyzer:5432/orderly_analyzer
    volumes:
      - ./orderly-dashboard-analyzer/config.json:/home/orderly/config.json:ro
    networks:
      - backend

  query-service:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-rust
      target: query-service
    restart: unless-stopped
    depends_on:
      indexer:
        condition: service_started
      analyzer:
        condition: service_started
    environment:
      INDEXER_DATABASE_URL: postgres://orderly:${POSTGRES_INDEXER_PASSWORD:-orderly_secret}@postgres-indexer:5432/orderly_indexer
      ANALYZER_DATABASE_URL: postgres://orderly:${POSTGRES_ANALYZER_PASSWORD:-orderly_secret}@postgres-analyzer:5432/orderly_analyzer
    volumes:
      - ./orderly-dashboard-query-service/config.json:/home/orderly/config.json:ro
    networks:
      - backend

  # ──────────────────────────────────────────────
  # RPC load balancer (Orderly L2)
  # ──────────────────────────────────────────────
  rpc-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./dockerfiles/nginx-rpc-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile-FE
    restart: unless-stopped
    depends_on:
      - query-service
    environment:
      NODE_ENV: production
      QUERY_SERVICE_URL: ${QUERY_SERVICE_URL:-http://query-service:8020}
      EVM_API_URL: ${EVM_API_URL:-https://api-evm.orderly.org}
    networks:
      - backend
      - frontend

  # ──────────────────────────────────────────────
  # Reverse proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./dockerfiles/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - query-service
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  pgdata-indexer:
  pgdata-analyzer:
