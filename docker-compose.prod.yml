# ──────────────────────────────────────────────
# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────
# Only nginx port exposed; DB/backend ports stay internal.

services:
  postgres-indexer:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres-analyzer:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  indexer:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  analyzer:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  query-service:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  frontend:
    restart: always
    environment:
      NODE_ENV: production
      QUERY_SERVICE_URL: ${QUERY_SERVICE_URL:-http://query-service:8020}
      EVM_API_URL: ${EVM_API_URL:-https://api-evm.orderly.org}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
